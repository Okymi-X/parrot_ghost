---
- name: "Updating apt repo/cache"
  apt: update_cache=yes force_apt_get=yes cache_valid_time=3600
  become: true
  become_method: sudo

- name: "Upgrade all packages"
  apt: upgrade=yes force_apt_get=yes
  become: true
  become_method: sudo

- name: "Remove unofficial docker images"
  package:
    name:
      - docker.io
      - docker-compose
      - docker-doc
      - podman-docker
    state: absent
  register: docker_remove
  become: true
  become_method: sudo
  ignore_errors: true

- name: "Remove NetExec - We want to use pipx for this"
  package:
    name:
      - netexec
    state: absent
  become: true
  become_method: sudo
  ignore_errors: true

- name: "Remove Containerd/Runc"
  package:
    name:
      - containerd
      - runc
    state: absent
  when: docker_remove.changed
  become: true
  become_method: sudo
  ignore_errors: true

